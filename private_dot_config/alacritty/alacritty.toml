[selection]
save_to_clipboard = true

[cursor.style]
blinking = "Off"

[font]
size = 12.5

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[window]
startup_mode = "Maximized"

[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = '#000000'
foreground = '#ffffff'

[colors.normal]
black   = '#000000'
red     = '#cc0000'
green   = '#1cb954'
yellow  = '#c4a000'
blue    = '#3465a4'
magenta = '#75507b'
cyan    = '#06989a'
white   = '#d3d7cf'

[colors.bright]
black   = '#555753'
red     = '#ef2929'
green   = '#1cb954'
yellow  = '#fce94f'
blue    = '#3465a4'
magenta = '#ad7fa8'
cyan    = '#34e2e2'
white   = '#eeeeec'

[[keyboard.bindings]]
key = "1"
mods = "Control"
chars = "\u001b[49;5u"

[[keyboard.bindings]]
key = "2"
mods = "Control"
chars = "\u001b[50;5u"

[[keyboard.bindings]]
key = "3"
mods = "Control"
chars = "\u001b[51;5u"

[[keyboard.bindings]]
key = "4"
mods = "Control"
chars = "\u001b[52;5u"

[[keyboard.bindings]]
key = "5"
mods = "Control"
chars = "\u001b[53;5u"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001bOM"

[[keyboard.bindings]]
key = "Back"
mods = "Control"
chars = "\u0017"
